# version: '3.8'

services:
  db:
    image: postgres:13
    restart: always
    environment:
      # Исправленные названия переменных для официального образа postgres
      - POSTGRES_USER=moodle
      - POSTGRES_DB=moodle
      - POSTGRES_PASSWORD=moodlepass123
    volumes:
      - postgres_data:/var/lib/postgresql/data

  moodle:
    # ИСПРАВЛЕНО: Изменено с 'bitmainlegacy' на 'bitnamilegacy'
    image: bitnamilegacy/moodle:4.5.0
    restart: always
    ports:
      - "8080:8080"
    environment:
      - MOODLE_DATABASE_TYPE=pgsql
      - MOODLE_DATABASE_HOST=db
      - MOODLE_DATABASE_PORT_NUMBER=5432
      - MOODLE_DATABASE_USER=moodle
      - MOODLE_DATABASE_PASSWORD=moodlepass123
      - MOODLE_DATABASE_NAME=moodle
      - MOODLE_USERNAME=admin
      - MOODLE_PASSWORD=admin123
    volumes:
      # ИСПРАВЛЕНО: Изменено с '/bitmain/moodle' на '/bitnami/moodle'
      - moodle_data:/bitnami/moodle
      - moodledata:/bitnami/moodledata
    depends_on:
      - db

volumes:
  postgres_data:
  moodle_data:
  moodledata: